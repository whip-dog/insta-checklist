<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インスタ運用チェックリスト 2026</title>
<style>
  :root {
    --grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    --color-bg: #faf7f5;
    --color-card: #ffffff;
    --color-text: #2b2b2b;
    --color-sub: #857c76;
    --color-accent: #dc2743;
    --color-done: #2d9d5f;
    --color-warn: #b45309;
    --color-warn-bg: #fff7ed;
    --color-detail-bg: #f7f2ef;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(0,0,0,.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    padding-bottom: 40px;
    line-height: 1.5;
  }
  header {
    background: var(--grad);
    color: #fff;
    padding: 20px 16px 16px;
    text-align: center;
  }
  header h1 { font-size: 1.12rem; letter-spacing: .04em; }
  header p { font-size: .7rem; opacity: .92; margin-top: 4px; }

  .tabs {
    display: flex; gap: 6px;
    padding: 10px 12px 4px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    position: sticky; top: 0; z-index: 10;
    background: var(--color-bg);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto; border: none;
    background: #fff; color: var(--color-sub);
    font-size: .78rem; font-weight: 700;
    padding: 9px 13px; border-radius: 999px;
    box-shadow: var(--shadow); cursor: pointer; white-space: nowrap;
  }
  .tab.active { background: var(--grad); color: #fff; }

  main { max-width: 640px; margin: 0 auto; padding: 8px 14px; }
  section { display: none; }
  section.show { display: block; animation: fade .18s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px);} to { opacity:1; transform:none;} }

  .intro { font-size: .74rem; color: var(--color-sub); background: #fff; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 11px 13px; margin: 8px 2px 4px; line-height: 1.6; }

  .progress-wrap { display: flex; align-items: center; gap: 10px; margin: 12px 2px 4px; }
  .progress-bar { flex: 1; height: 8px; background: #eee2dc; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--grad); border-radius: 99px; transition: width .3s ease; }
  .progress-label { font-size: .75rem; font-weight: 700; color: var(--color-accent); min-width: 3.2em; text-align: right; }

  .group-title { font-size: .77rem; font-weight: 700; color: var(--color-sub); margin: 18px 4px 8px; letter-spacing: .05em; }
  .card { background: var(--color-card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 10px; }

  .item { border-bottom: 1px solid #f3ece8; }
  .card .item:last-child { border-bottom: none; }
  .item-main { display: flex; gap: 12px; align-items: flex-start; padding: 13px 14px 10px; cursor: pointer; }
  .item-main input { display: none; }
  .checkbox { flex: 0 0 22px; height: 22px; margin-top: 1px; border: 2px solid #d9cfc9; border-radius: 7px;
    display: grid; place-items: center; transition: all .15s ease; }
  .checkbox::after { content: "✓"; color: #fff; font-size: 14px; font-weight: 800; transform: scale(0); transition: transform .15s ease; }
  .item-main input:checked + .checkbox { background: var(--color-done); border-color: var(--color-done); }
  .item-main input:checked + .checkbox::after { transform: scale(1); }
  .item-body { flex: 1; }
  .item-title { display: block; font-size: .89rem; font-weight: 600; line-height: 1.45; }
  .item-note { display: block; font-size: .75rem; color: var(--color-sub); line-height: 1.55; margin-top: 3px; }
  .item-main input:checked ~ .item-body .item-title { color: #b7aaa2; text-decoration: line-through; }

  .badge { display: inline-block; font-size: .61rem; font-weight: 700; padding: 1px 7px; border-radius: 99px; margin-left: 5px; vertical-align: 1px; white-space: nowrap; }
  .badge.new { background: #fdecef; color: var(--color-accent); }
  .badge.law { background: #eef4fd; color: #2563a8; }

  .detail-toggle { margin: 0 0 11px 48px; border: none; background: none; color: var(--color-accent);
    font-size: .74rem; font-weight: 700; cursor: pointer; padding: 2px 0; font-family: inherit; }
  .detail { display: none; margin: 0 14px 13px 48px; padding: 11px 13px; background: var(--color-detail-bg);
    border-radius: 10px; font-size: .77rem; line-height: 1.7; color: #4a423c; }
  .detail.open { display: block; }
  .detail b { color: var(--color-accent); }
  .detail .path { display: inline-block; background: #fff; border: 1px solid #e5dcd6; border-radius: 6px;
    padding: 1px 6px; font-size: .72rem; margin: 2px 0; }

  .reset-btn { display: block; width: 100%; margin: 14px 0 6px; padding: 12px; border: none; border-radius: var(--radius);
    background: #fff; color: var(--color-accent); font-size: .82rem; font-weight: 700; box-shadow: var(--shadow); cursor: pointer; }
  .daily-date { font-size: .74rem; color: var(--color-sub); text-align: center; margin: 8px 0 2px; }
  .all-done { display: none; text-align: center; font-size: .9rem; font-weight: 700; color: var(--color-done); padding: 14px 0 4px; }
  .all-done.show { display: block; }
  .foot-note { font-size: .72rem; color: var(--color-sub); text-align: center; margin-top: 10px; line-height: 1.6; }

  /* 早見表 */
  .ref-title { font-size: .9rem; font-weight: 700; margin: 20px 4px 8px; display: flex; align-items: center; gap: 6px; }
  .ref-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 6px 4px; margin-bottom: 6px; overflow: hidden; }
  table.ref { width: 100%; border-collapse: collapse; font-size: .78rem; }
  table.ref th, table.ref td { text-align: left; padding: 9px 12px; border-bottom: 1px solid #f3ece8; vertical-align: top; }
  table.ref tr:last-child td { border-bottom: none; }
  table.ref th { color: var(--color-sub); font-weight: 700; font-size: .72rem; background: #faf7f5; }
  table.ref td:first-child { font-weight: 600; white-space: nowrap; }
  table.ref .hl { color: var(--color-accent); font-weight: 700; }
  .ref-note { font-size: .73rem; color: var(--color-sub); line-height: 1.65; margin: 6px 6px 4px; }

  /* NG集 */
  .ng-card { background: var(--color-warn-bg); border-left: 4px solid var(--color-warn); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .ng-card h3 { font-size: .85rem; color: var(--color-warn); margin-bottom: 3px; }
  .ng-card p { font-size: .77rem; line-height: 1.65; }
  .rescue { background: #eefaf2; border-left-color: var(--color-done); }
  .rescue h3 { color: var(--color-done); }

  footer { text-align: center; font-size: .67rem; color: var(--color-sub); margin-top: 26px; padding: 0 20px; line-height: 1.7; }
</style>
</head>
<body>

<header>
  <h1>📸 インスタ運用チェックリスト</h1>
  <p>2026年 新ルール対応版 — これ1つで開設から毎日まで完結</p>
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-tab="setup">🚀 開設</button>
  <button class="tab" data-tab="post">✍️ 投稿前</button>
  <button class="tab" data-tab="daily">☀️ 毎日</button>
  <button class="tab" data-tab="weekly">📊 週1回</button>
  <button class="tab" data-tab="waza">💎 公式ワザ</button>
  <button class="tab" data-tab="ref">📐 早見表</button>
  <button class="tab" data-tab="ng">⚠️ NG・救済</button>
</nav>

<main>
  <section id="setup" class="show"></section>
  <section id="post"></section>
  <section id="daily"></section>
  <section id="weekly"></section>
  <section id="waza"></section>
  <section id="ref"></section>
  <section id="ng"></section>
</main>

<footer>
  参考：Instagram公式ヘルプセンター／Meta公式発表（2025年12月ハッシュタグ上限5個・2026年5月オリジナル優遇）／Instagram代表 A.モセリ氏の公表シグナル／消費者庁ステマ規制（2023年10月施行）<br>
  チェック状態はこの端末のブラウザに保存されます
</footer>

<script>

const CHECKLISTS = {

    { title: 'STEP 1｜アカウントの土台', items: [
      { key:'s1', title:'ユーザーネーム（@ID）を決める', note:'半角英数字と「.」「_」のみ・最大30文字。短く覚えやすく',
        detail:'使えるのは<b>半角英数字・ピリオド(.)・アンダースコア(_)だけ</b>。スペース・日本語・その他記号は不可。後から変更できるが、頻繁に変えると検索やタグ付けで見つけられなくなる。<br>例：<span class="path">roy.care.diary</span><span class="path">miyagi_roy</span>' },

    ]},
    { title: 'STEP 2｜プロフィールを整える（ここで9割決まる）', items: [

        detail:'顔・ロゴ・愛犬など。<b>円形にトリミングされる</b>ので被写体は中央に。推奨は320×320px以上の正方形。発信テーマと合った雰囲気に。' },
      { key:'s6', title:'「名前」欄にキーワードを入れる（最大64文字）', note:'名前欄は検索対象。ここで見つけてもらえるかが変わる',
        detail:'「名前」は@IDとは別欄。<b>ここに書いた言葉で検索にヒットする</b>。<br>「名前＋発信テーマ＋地域」が鉄則。例：<span class="path">ロイ｜宮城のシニア犬の介護記録</span>。「〇〇（本名）」だけは検索で誰にも見つからないのでもったいない。' },

      { key:'s11', title:'3〜9投稿ためてから告知する', note:'来た人が世界観を判断できる状態にしてからフォローを募る',
        detail:'プロフィールに来た人は「投稿が数本ある＝ちゃんとした人」で判断する。空っぽの状態で告知すると離脱される。まず3〜9本並べてから拡散・告知を。' },
      { key:'s12', title:'アカウントステータスの場所を覚える', note:'違反・おすすめ制限を確認できる唯一の公式画面',

  post: { footer: '<button class="reset-btn" data-reset="post">↺ この投稿のチェックをリセット（次の投稿用）</button>', groups: [

/* ================= 描画 ================= */
const STORAGE = "insta-checklist-v2";
// file://やプライベートモードでlocalStorageが例外を投げても描画を止めないよう保護
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE) || "{}"); }
  catch (e) { return {}; }
}
let state = loadState();
function save() {
  try { localStorage.setItem(STORAGE, JSON.stringify(state)); }
  catch (e) { /* 保存できない環境でもアプリは動作継続 */ }
}

// 毎日タブ：日付が変わったらリセット
const today = new Date().toLocaleDateString("ja-JP");
if (state._dailyDate !== today) {
  Object.keys(state).forEach(k => { if (k[0] === "d") delete state[k]; });
  state._dailyDate = today;
}

function itemHTML(it) {
  return `<div class="item">
    <label class="item-main">
      <input type="checkbox" data-key="${it.key}" ${state[it.key] ? "checked" : ""}>
      <span class="checkbox"></span>
      <span class="item-body">
        <span class="item-title">${it.title}${it.badge || ""}</span>
        <span class="item-note">${it.note}</span>
      </span>
    </label>
    ${it.detail ? `<button class="detail-toggle" type="button">詳しい手順を見る ▾</button><div class="detail">${it.detail}</div>` : ""}
  </div>`;
}

function renderChecklist(id, cfg) {
  let html = `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill"></div></div><span class="progress-label">0%</span></div>`;
  if (id === "daily") html = `<p class="daily-date" id="dailyDate">今日：${today}</p>` + html;
  cfg.groups.forEach(g => {
    html += `<div class="group-title">${g.title}</div><div class="card">`;
    g.items.forEach(it => html += itemHTML(it));
    html += `</div>`;
  });
  html += cfg.footer || "";
  document.getElementById(id).innerHTML = html;
}

Object.keys(CHECKLISTS).forEach(id => renderChecklist(id, CHECKLISTS[id]));
document.getElementById("ref").innerHTML = REF_HTML;
document.getElementById("ng").innerHTML = NG_HTML;

/* 進捗バー */
function updateProgress(section) {
  const bar = section.querySelector(".progress-fill");
  if (!bar) return;
  const inputs = section.querySelectorAll(".item-main input");
  const done = [...inputs].filter(i => i.checked).length;
  const pct = inputs.length ? Math.round(done / inputs.length * 100) : 0;
  bar.style.width = pct + "%";
  section.querySelector(".progress-label").textContent = pct + "%";
  if (section.id === "daily") {
    const dd = document.getElementById("dailyDone");
    if (dd) dd.classList.toggle("show", pct === 100);
  }
}

/* イベント */
document.querySelectorAll(".item-main input").forEach(input => {
  input.addEventListener("change", () => {
    state[input.dataset.key] = input.checked;
    save();
    updateProgress(input.closest("section"));
  });
});
document.querySelectorAll(".detail-toggle").forEach(btn => {
  btn.addEventListener("click", () => {
    const d = btn.nextElementSibling;
    const open = d.classList.toggle("open");
    btn.textContent = open ? "閉じる ▴" : "詳しい手順を見る ▾";
  });
});
document.querySelectorAll(".reset-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const section = document.getElementById(btn.dataset.reset);
    section.querySelectorAll(".item-main input").forEach(input => {
      input.checked = false;
      delete state[input.dataset.key];
    });
    save();
    updateProgress(section);
  });
});

/* タブ切り替え */
const tabs = document.querySelectorAll(".tab");
tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll("main section").forEach(s => s.classList.remove("show"));
    document.getElementById(tab.dataset.tab).classList.add("show");
    window.scrollTo(0, 0);
  });
});

document.querySelectorAll("main section").forEach(updateProgress);
</script>
